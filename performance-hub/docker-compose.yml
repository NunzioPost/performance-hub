services:
  postgres:
    image: postgres:16-alpine
    container_name: performance-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: performance_hub
      POSTGRES_USER: performance_hub
      POSTGRES_PASSWORD: performance_hub
    ports:
      - "15432:5432"
    volumes:
      - ph_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U performance_hub -d performance_hub"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  ph_postgres_data:
